    <!-- bagian script validasi form -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('FormSignUp');
        const inputNama = document.getElementById('inputNama');
        const inputNo = document.getElementById('inputNo');
        const inputDomisili = document.getElementById('inputDomisili');
        const inputEmail = document.getElementById('inputEmail');

      //event buat validasi pas submit
      form.addEventListener('submit', (event) => {
            event.preventDefault(); //Untuk mencegah submit

            let isValid = true;
            let errorMessage = '';

            //Nama
            if (inputNama.value.trim() === '') {
                errorMessage += 'Nama harus diisi!\n';
                isValid = false;
            }

            // Validasi email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(inputEmail.value.trim())) {
                errorMessage += 'Email kamu tidak valid!\n';
                isValid = false;
            }

            if (inputDomisili.value === 'option-domisili') {
                errorMessage += 'Silakan pilih domisili!\n';
                isValid = false;
            }

            // Validasi Nomor
            const NoValue = inputNo.value;
            if (NoValue.length < 1) {
                errorMessage += 'No Telepon harus diisi!\n';
                isValid = false;
            }
             else if (!/\d/.test(NoValue)) {
                errorMessage += 'No Telepon harus mengandung minimal 1 angka!\n';
                isValid = false;
            }

            if (!isValid) {
                alert(errorMessage);
                return;
            }

            // kalau berhasil akan dibawa ke page notifikasi pendaftaran
            window.location.href = "notifikasipendaftaran.html";
        });
    });
    </script>
